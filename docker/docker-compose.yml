version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: nafadpay-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-nafadpay}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nafadpay0001}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - nafadpay_pgdata:/var/lib/postgresql/data
      - ../data:/workspace/data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-nafadpay}"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  nafadpay_pgdata:
